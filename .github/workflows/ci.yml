name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.7.4
      - run: ruff check localscribe tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # Tests import a few stage modules but the heavy deps (torch,
      # pyannote, faster-whisper, yt-dlp) are loaded lazily inside the
      # stage `run()` functions, so CI doesn't need them. httpx is
      # imported at module load by the openai_api backend, so it's the
      # only runtime dep we install.
      - run: pip install pytest httpx
      - run: PYTHONPATH=. pytest tests/ -q

  install-smoke:
    # Manual only: verifies `pip install -e .` succeeds with the full
    # dependency tree (torch, pyannote, etc.). Slow, so we don't run it
    # on every push.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: python -c "import localscribe; print(localscribe.__version__)"
